<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pairpad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Connect overlay --- */
    #connect-overlay {
      position: fixed; inset: 0;
      background: #1e1e2e;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #connect-box {
      text-align: center;
      max-width: 400px;
      padding: 48px 32px;
    }
    #connect-box h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #cdd6f4;
    }
    #connect-box .tagline {
      color: #a6adc8;
      font-size: 15px;
      margin-bottom: 32px;
    }
    #connect-box .input-row {
      display: flex;
      gap: 8px;
    }
    #connect-box input {
      flex: 1;
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #connect-box input:focus {
      border-color: #89b4fa;
    }
    #connect-box button {
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #connect-box button:hover {
      background: #74c7ec;
    }
    #connect-error {
      color: #f38ba8;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    /* --- IDE layout --- */
    #ide {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    /* Top bar */
    #topbar {
      height: 36px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 12px;
      color: #a6adc8;
      flex-shrink: 0;
    }
    #topbar .session-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #topbar .session-id {
      color: #585b70;
      font-family: monospace;
    }
    #topbar .participants {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    #topbar .participants {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .participant-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .participant-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .participant-name {
      color: #a6adc8;
    }
    .participant-name.you {
      font-weight: 600;
      color: #cdd6f4;
    }

    /* Main area: sidebar + editor */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: #181825;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      color: #585b70;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #313244;
    }
    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      user-select: none;
    }
    .tree-item:hover {
      background: #313244;
    }
    .tree-item.active {
      background: #313244;
      color: #cdd6f4;
    }
    .tree-item .icon {
      width: 16px;
      margin-right: 6px;
      text-align: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .tree-dir > .icon { color: #89b4fa; }
    .tree-file > .icon { color: #585b70; }
    .tree-dir.collapsed > .children { display: none; }
    .tree-dir > .tree-label { color: #89b4fa; }
    .children { /* nested container, indented via padding on .tree-item */ }

    /* Tabs */
    #tabs {
      display: flex;
      background: #181825;
      border-bottom: 1px solid #313244;
      min-height: 35px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      border-right: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: #a6adc8;
    }
    .tab.active {
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .tab .close {
      font-size: 14px;
      opacity: 0;
      line-height: 1;
    }
    .tab:hover .close { opacity: 0.5; }
    .tab .close:hover { opacity: 1; }

    /* Editor */
    #editor-container {
      flex: 1;
      overflow: hidden;
    }
    /* Status bar */
    #status {
      height: 22px;
      background: #181825;
      border-top: 1px solid #313244;
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #585b70;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="connect-overlay">
    <div id="connect-box">
      <h1>Pairpad</h1>
      <p class="tagline">Collaborative code editing on your local files</p>

      <!-- Step 1: Session ID -->
      <div id="step-session">
        <div class="input-row">
          <input type="text" id="session-input" placeholder="Paste a session link or ID" autofocus>
          <button onclick="submitSession()">Next</button>
        </div>
      </div>

      <!-- Step 2: Display name -->
      <div id="step-name" style="display:none">
        <p class="tagline" style="margin-bottom:16px">What should others call you?</p>
        <div class="input-row">
          <input type="text" id="name-input" placeholder="Your name" maxlength="30">
          <button onclick="joinSession()">Join</button>
        </div>
      </div>

      <div id="connect-error"></div>
    </div>
  </div>

  <div id="ide">
    <div id="topbar">
      <div class="session-info">
        <strong>Pairpad</strong>
        <span class="session-id" id="session-id-display"></span>
      </div>
      <div class="participants" id="participant-list"></div>
    </div>
    <div id="workspace">
      <div id="sidebar">
        <div id="sidebar-header">Explorer</div>
        <div id="file-tree"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;">
        <div id="tabs"></div>
        <div id="editor-container"></div>
      </div>
    </div>
    <div id="status">
      <span id="status-text">Connected</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
