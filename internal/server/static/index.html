<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pairpad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      overflow: hidden;
    }

    /* --- Connect overlay --- */
    #connect-overlay {
      position: fixed; inset: 0;
      background: #1e1e2e;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #connect-box {
      text-align: center;
      max-width: 400px;
      padding: 48px 32px;
    }
    #connect-box h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #cdd6f4;
    }
    #connect-box .tagline {
      color: #a6adc8;
      font-size: 15px;
      margin-bottom: 32px;
    }
    #connect-box .input-row {
      display: flex;
      gap: 8px;
    }
    #connect-box input {
      flex: 1;
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #connect-box input:focus {
      border-color: #89b4fa;
    }
    #connect-box button {
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #connect-box button:hover {
      background: #74c7ec;
    }
    #connect-error {
      color: #f38ba8;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    /* --- IDE layout --- */
    #ide {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    /* Top bar */
    #topbar {
      height: 36px;
      background: #181825;
      border-bottom: 1px solid #313244;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 12px;
      color: #a6adc8;
      flex-shrink: 0;
    }
    #topbar .session-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #topbar .session-id {
      color: #585b70;
      font-family: monospace;
    }
    #topbar .participants {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .participant-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .participant-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .participant-name {
      color: #a6adc8;
    }
    .participant-name.you {
      font-weight: 600;
      color: #cdd6f4;
    }
    .participant-file {
      font-size: 10px;
      color: #585b70;
      margin-left: 2px;
    }
    .follow-indicator {
      font-size: 10px;
      margin-left: 2px;
    }
    .tree-presence {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Main area: sidebar + editor */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: #181825;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      color: #585b70;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #313244;
    }
    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      user-select: none;
    }
    .tree-item:hover {
      background: #313244;
    }
    .tree-item.active {
      background: #313244;
      color: #cdd6f4;
    }
    .tree-item .icon {
      width: 16px;
      margin-right: 6px;
      text-align: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .tree-dir > .icon { color: #89b4fa; }
    .tree-file > .icon { color: #585b70; }
    .tree-dir.collapsed > .children { display: none; }
    .tree-dir > .tree-label { color: #89b4fa; }
    /* Tabs */
    #tabs {
      display: flex;
      background: #181825;
      border-bottom: 1px solid #313244;
      min-height: 35px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      border-right: 1px solid #313244;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: #a6adc8;
    }
    .tab.active {
      background: #1e1e2e;
      color: #cdd6f4;
    }
    .tab .close {
      font-size: 14px;
      opacity: 0;
      line-height: 1;
    }
    .tab:hover .close { opacity: 0.5; }
    .tab .close:hover { opacity: 1; }

    /* Editor */
    #editor-container {
      flex: 1;
      overflow: hidden;
    }
    /* Comment gutter in CodeMirror */
    .cm-comment-gutter { width: 14px; cursor: pointer; }
    .cm-comment-gutter .cm-gutterElement { display: flex; align-items: center; justify-content: center; }

    /* Comment sidebar */
    #comment-sidebar {
      width: 300px;
      background: #181825;
      border-left: 1px solid #313244;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #comment-sidebar.hidden { display: none; }
    #comment-header {
      padding: 10px 12px;
      font-size: 11px;
      color: #585b70;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #313244;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #comment-header .toggle-btn {
      cursor: pointer;
      color: #585b70;
      font-size: 14px;
    }
    #comment-header .toggle-btn:hover { color: #cdd6f4; }
    #comment-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .comment-thread {
      padding: 8px 12px;
      border-bottom: 1px solid #313244;
    }
    .comment-thread.resolved {
      opacity: 0.4;
    }
    .comment-thread.orphaned {
      border-left: 2px solid #f38ba8;
    }
    .comment-orphaned-badge {
      font-size: 10px;
      color: #f38ba8;
      margin-bottom: 4px;
    }
    .comment-location {
      font-size: 11px;
      color: #89b4fa;
      cursor: pointer;
      margin-bottom: 4px;
    }
    .comment-location:hover { text-decoration: underline; }
    .comment-entry {
      margin-bottom: 6px;
    }
    .comment-author {
      font-size: 11px;
      font-weight: 600;
      margin-right: 4px;
    }
    .comment-time {
      font-size: 10px;
      color: #585b70;
    }
    .comment-body {
      font-size: 13px;
      line-height: 1.4;
      margin-top: 2px;
      word-break: break-word;
    }
    .comment-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .comment-actions button {
      background: none;
      border: none;
      color: #585b70;
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }
    .comment-actions button:hover { color: #cdd6f4; }
    .comment-reply-input {
      display: none;
      margin-top: 6px;
    }
    .comment-reply-input input {
      width: 100%;
      background: #313244;
      border: 1px solid #45475a;
      color: #cdd6f4;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    .comment-reply-input input:focus { border-color: #89b4fa; }
    #comment-toggle-btn {
      position: absolute;
      right: 0;
      top: 37px;
      background: #181825;
      border: 1px solid #313244;
      border-right: none;
      color: #585b70;
      padding: 4px 6px;
      cursor: pointer;
      font-size: 12px;
      border-radius: 4px 0 0 4px;
      z-index: 10;
    }
    #comment-toggle-btn:hover { color: #cdd6f4; }
    .comment-count-badge {
      background: #89b4fa;
      color: #1e1e2e;
      font-size: 10px;
      font-weight: 700;
      padding: 0 5px;
      border-radius: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 32px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: #313244;
      border: 1px solid #45475a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #cdd6f4;
      cursor: pointer;
      max-width: 320px;
      animation: toast-in 0.2s ease-out;
    }
    .toast:hover { background: #45475a; }
    .toast .toast-author { font-weight: 600; }
    .toast .toast-location { color: #89b4fa; font-size: 11px; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Guide mode */
    #guide-btn {
      background: #313244;
      border: 1px solid #45475a;
      color: #a6adc8;
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #guide-btn:hover { border-color: #89b4fa; color: #cdd6f4; }
    #guide-btn.active {
      background: #89b4fa;
      color: #1e1e2e;
      border-color: #89b4fa;
    }
    #guide-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 12px;
      font-size: 12px;
      border-bottom: 1px solid;
      flex-shrink: 0;
    }
    #follow-btn {
      background: #313244;
      border: 1px solid #45475a;
      color: #a6adc8;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #follow-btn:hover { border-color: #89b4fa; color: #cdd6f4; }
    #follow-btn.active {
      background: #a6e3a1;
      color: #1e1e2e;
      border-color: #a6e3a1;
    }

    /* Status bar */
    #status {
      height: 22px;
      background: #181825;
      border-top: 1px solid #313244;
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: #585b70;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="connect-overlay">
    <div id="connect-box">
      <h1>Pairpad</h1>
      <p class="tagline">Collaborative code editing on your local files</p>

      <!-- Step 1: Session ID -->
      <div id="step-session">
        <div class="input-row">
          <input type="text" id="session-input" placeholder="Paste a session link or ID" autofocus>
          <button onclick="submitSession()">Next</button>
        </div>
      </div>

      <!-- Step 2: Display name -->
      <div id="step-name" style="display:none">
        <p class="tagline" style="margin-bottom:16px">What should others call you?</p>
        <div class="input-row">
          <input type="text" id="name-input" placeholder="Your name" maxlength="30">
          <button onclick="joinSession()">Join</button>
        </div>
      </div>

      <div id="connect-error"></div>
    </div>
  </div>

  <div id="ide">
    <div id="topbar">
      <div class="session-info">
        <strong>Pairpad</strong>
        <span class="session-id" id="session-id-display"></span>
      </div>
      <div class="participants" id="participant-list"></div>
      <button id="guide-btn" onclick="toggleGuide()">Guide</button>
    </div>
    <div id="workspace">
      <div id="sidebar">
        <div id="sidebar-header">Explorer</div>
        <div id="file-tree"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;">
        <div id="guide-banner"><span id="guide-banner-text"></span><button id="follow-btn" onclick="toggleFollow()">Follow</button></div>
        <div id="tabs"></div>
        <div id="editor-container"></div>
        <button id="comment-toggle-btn" onclick="toggleCommentSidebar()">Comments</button>
      </div>
      <div id="comment-sidebar">
        <div id="comment-header">
          <span>Comments</span>
          <span class="toggle-btn" onclick="toggleCommentSidebar()">&times;</span>
        </div>
        <div id="comment-feed"></div>
      </div>
    </div>
    <div id="toast-container"></div>
    <div id="status">
      <span id="status-text">Connected</span>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
