<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pairpad</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    /* Theme variables */
    :root, .theme-dark {
      --bg-primary: #1e1e2e;
      --bg-secondary: #181825;
      --bg-hover: #313244;
      --bg-input: #313244;
      --border: #313244;
      --border-input: #45475a;
      --text-primary: #cdd6f4;
      --text-secondary: #a6adc8;
      --text-muted: #585b70;
      --accent: #89b4fa;
      --accent-hover: #74c7ec;
      --error: #f38ba8;
      --success: #a6e3a1;
    }
    .theme-light {
      --bg-primary: #ffffff;
      --bg-secondary: #f6f8fa;
      --bg-hover: #e8eaed;
      --bg-input: #f0f1f3;
      --border: #d0d7de;
      --border-input: #c0c7cf;
      --text-primary: #24292e;
      --text-secondary: #57606a;
      --text-muted: #8b949e;
      --accent: #0969da;
      --accent-hover: #0550ae;
      --error: #cf222e;
      --success: #1a7f37;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
    }

    /* --- Connect overlay --- */
    #connect-overlay {
      position: fixed; inset: 0;
      background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #connect-box {
      text-align: center;
      max-width: 400px;
      padding: 48px 32px;
    }
    #connect-box h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      color: var(--text-primary);
    }
    #connect-box .tagline {
      color: var(--text-secondary);
      font-size: 15px;
      margin-bottom: 32px;
    }
    #connect-box .input-row {
      display: flex;
      gap: 8px;
    }
    #connect-box input {
      flex: 1;
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    #connect-box input:focus {
      border-color: var(--accent);
    }
    #connect-box button {
      background: var(--accent);
      color: var(--bg-primary);
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    #connect-box button:hover {
      background: var(--accent-hover);
    }
    #connect-error {
      color: var(--error);
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
    }

    /* --- IDE layout --- */
    #ide {
      display: none;
      height: 100vh;
      flex-direction: column;
    }

    /* Top bar */
    #topbar {
      height: 36px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 12px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    #topbar .session-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    #topbar .session-id {
      color: var(--text-muted);
      font-family: monospace;
    }
    #topbar .participants {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .participant-badge {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
    }
    .participant-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
    }
    .participant-name {
      color: var(--text-secondary);
    }
    .participant-name.you {
      font-weight: 600;
      color: var(--text-primary);
    }
    .participant-file {
      font-size: 10px;
      color: var(--text-muted);
      margin-left: 2px;
    }
    .follow-indicator {
      font-size: 10px;
      margin-left: 2px;
    }
    .tree-presence {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Main area: sidebar + editor */
    #workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    #sidebar {
      width: 240px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #sidebar-header {
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }
    #file-tree {
      flex: 1;
      overflow-y: auto;
      padding: 4px 0;
    }
    .tree-item {
      display: flex;
      align-items: center;
      padding: 3px 12px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      user-select: none;
    }
    .tree-item:hover {
      background: var(--bg-hover);
    }
    .tree-item.active {
      background: var(--bg-hover);
      color: var(--text-primary);
    }
    .tree-item .icon {
      width: 16px;
      margin-right: 6px;
      text-align: center;
      font-size: 11px;
      flex-shrink: 0;
    }
    .tree-dir > .icon { color: var(--accent); }
    .tree-file > .icon { color: var(--text-muted); }
    .tree-dir.collapsed > .children { display: none; }
    .tree-dir > .tree-label { color: var(--accent); }
    /* Tabs */
    #tabs {
      display: flex;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      min-height: 35px;
      overflow-x: auto;
      flex-shrink: 0;
    }
    .tab {
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
      color: var(--text-secondary);
    }
    .tab.active {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .tab .unsaved-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--text-muted);
      display: none;
      flex-shrink: 0;
    }
    .tab.unsaved .unsaved-dot { display: inline-block; }
    .tab.unsaved .close { display: none; }
    .tab .close {
      font-size: 14px;
      opacity: 0;
      line-height: 1;
    }
    .tab:hover .close { opacity: 0.5; }
    .tab .close:hover { opacity: 1; }

    /* Editor */
    #editor-container {
      flex: 1;
      overflow: hidden;
    }
    /* Quick file picker (Ctrl+P) */
    #file-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      justify-content: center;
      padding-top: 20vh;
    }
    #file-picker {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      width: 500px;
      max-height: 400px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #file-picker input {
      background: var(--bg-input);
      border: none;
      border-bottom: 1px solid var(--border);
      color: var(--text-primary);
      padding: 12px 16px;
      font-size: 14px;
      outline: none;
    }
    #file-picker-results {
      overflow-y: auto;
      max-height: 340px;
    }
    .file-picker-item {
      padding: 6px 16px;
      font-size: 13px;
      cursor: pointer;
      color: var(--text-secondary);
    }
    .file-picker-item.active {
      background: var(--accent);
      color: var(--bg-primary);
    }
    .file-picker-item:hover:not(.active) {
      background: var(--bg-hover);
    }
    .file-picker-match {
      color: var(--accent);
      font-weight: 700;
    }
    .file-picker-item.active .file-picker-match {
      color: var(--bg-primary);
    }

    /* Read-only banner */
    #readonly-banner {
      display: none;
      padding: 3px 12px;
      font-size: 11px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      text-align: center;
    }

    /* Breadcrumb path bar */
    #breadcrumb {
      display: none;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #breadcrumb span { cursor: default; }
    #breadcrumb .breadcrumb-sep { margin: 0 4px; }
    #breadcrumb .breadcrumb-dir {
      cursor: pointer;
      color: var(--text-secondary);
    }
    #breadcrumb .breadcrumb-dir:hover { color: var(--accent); }
    #breadcrumb .breadcrumb-file { color: var(--text-primary); }

    /* Reconnection banner */
    #reconnect-banner {
      display: none;
      background: var(--error);
      color: var(--bg-primary);
      padding: 6px 16px;
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* Search results */
    .search-match-file { color: var(--accent); font-size: 11px; }
    .search-match-line { color: var(--text-muted); font-size: 11px; margin-left: 4px; }
    .search-match-content { font-family: monospace; font-size: 12px; margin-top: 2px; }
    .search-match-highlight { background: var(--accent); color: var(--bg-primary); border-radius: 2px; padding: 0 1px; }
    .search-truncated { padding: 8px 16px; font-size: 12px; color: var(--text-muted); font-style: italic; }

    /* Gutters */
    .cm-lineNumbers { cursor: pointer; }
    .cm-lineNumbers .cm-gutterElement:hover {
      color: var(--accent);
      background: var(--bg-hover);
      border-radius: 2px;
    }
    .cm-marker-gutter { width: 20px; cursor: pointer; }
    .cm-marker-gutter .cm-gutterElement { display: flex; align-items: center; justify-content: center; }

    /* Comment sidebar */
    #comment-sidebar {
      width: 300px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    #comment-sidebar.hidden { display: none; }
    #comment-toggle-btn .badge {
      background: var(--accent);
      color: var(--bg-primary);
      font-size: 10px;
      font-weight: 700;
      padding: 0 5px;
      border-radius: 8px;
      margin-left: 4px;
    }
    #comment-header {
      padding: 10px 12px;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #comment-header .toggle-btn {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
    }
    #comment-header .toggle-btn:hover { color: var(--text-primary); }
    #comment-feed {
      flex: 1;
      overflow-y: auto;
      padding: 8px 0;
    }
    .comment-thread {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
    }
    .comment-thread.resolved {
      opacity: 0.4;
    }
    .comment-thread.orphaned {
      border-left: 2px solid #f38ba8;
    }
    .comment-orphaned-badge {
      font-size: 10px;
      color: var(--error);
      margin-bottom: 4px;
    }
    .comment-location {
      font-size: 11px;
      color: var(--accent);
      cursor: pointer;
      margin-bottom: 4px;
    }
    .comment-location:hover { text-decoration: underline; }
    .comment-entry {
      margin-bottom: 6px;
    }
    .comment-author {
      font-size: 11px;
      font-weight: 600;
      margin-right: 4px;
    }
    .comment-time {
      font-size: 10px;
      color: var(--text-muted);
    }
    .comment-body {
      font-size: 13px;
      line-height: 1.4;
      margin-top: 2px;
      word-break: break-word;
    }
    .comment-body .inline-code {
      background: var(--bg-hover);
      padding: 1px 4px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 12px;
    }
    .comment-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .comment-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
    }
    .comment-actions button:hover { color: var(--text-primary); }
    .comment-reply-input {
      display: none;
      margin-top: 6px;
    }
    .comment-reply-input input {
      width: 100%;
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    .comment-reply-input input:focus { border-color: var(--accent); }
    #comment-toggle-btn {
      position: absolute;
      right: 0;
      top: 37px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-right: none;
      color: var(--text-muted);
      padding: 4px 6px;
      cursor: pointer;
      font-size: 12px;
      border-radius: 4px 0 0 4px;
      z-index: 10;
    }
    #comment-toggle-btn:hover { color: var(--text-primary); }
    .comment-count-badge {
      background: var(--accent);
      color: var(--bg-primary);
      font-size: 10px;
      font-weight: 700;
      padding: 0 5px;
      border-radius: 8px;
      margin-left: auto;
      flex-shrink: 0;
    }

    /* Toast */
    #toast-container {
      position: fixed;
      bottom: 32px;
      right: 16px;
      z-index: 200;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toast {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--text-primary);
      cursor: pointer;
      max-width: 320px;
      animation: toast-in 0.2s ease-out;
    }
    .toast:hover { background: var(--border-input); }
    .toast .toast-author { font-weight: 600; }
    .toast .toast-location { color: var(--accent); font-size: 11px; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Tour mode */
    #tour-bar {
      display: none;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 6px 12px;
      flex-shrink: 0;
      font-size: 12px;
      align-items: center;
      gap: 8px;
    }
    #tour-bar select {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }
    #tour-bar .tour-nav {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #tour-bar .tour-nav button {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #tour-bar .tour-nav button:hover { border-color: var(--accent); color: var(--text-primary); }
    #tour-bar .tour-nav button:disabled { opacity: 0.3; cursor: default; }
    #tour-step-counter { color: var(--text-muted); font-size: 11px; }
    #tour-close-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 14px;
      cursor: pointer;
      margin-left: auto;
    }
    #tour-close-btn:hover { color: var(--text-primary); }
    #tour-step-panel {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      flex-shrink: 0;
    }
    #tour-step-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 4px;
    }
    #tour-step-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .tree-item.tree-unsaved .tree-label { font-style: italic; }
    .tree-tour-indicator {
      font-size: 9px;
      color: var(--accent);
      margin-left: auto;
      flex-shrink: 0;
    }
    #tour-toggle-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #tour-toggle-btn:hover { border-color: var(--accent); color: var(--text-primary); }

    /* Tour creation */
    #tour-create-panel {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      max-height: 250px;
      overflow-y: auto;
      flex-shrink: 0;
    }
    #tour-create-panel input {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
      width: 100%;
      margin-bottom: 6px;
    }
    #tour-create-panel input:focus { border-color: var(--accent); }
    .tour-step-edit {
      background: var(--bg-hover);
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }
    .tour-step-edit .step-location {
      color: var(--accent);
      font-size: 11px;
      margin-bottom: 4px;
    }
    .tour-step-edit input {
      margin-bottom: 4px;
    }
    .tour-step-edit textarea {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-primary);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
      width: 100%;
      resize: vertical;
      min-height: 40px;
    }
    .tour-step-edit textarea:focus { border-color: var(--accent); }
    .tour-step-edit .step-remove {
      color: var(--error);
      font-size: 11px;
      cursor: pointer;
      float: right;
    }
    .tour-step-edit .step-remove:hover { text-decoration: underline; }
    .tour-step-edit.reanchoring {
      outline: 1px solid #89b4fa;
      outline-offset: -1px;
    }
    .tour-create-hint {
      color: var(--text-muted);
      font-size: 11px;
      margin: 6px 0;
    }
    .tour-create-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .tour-create-actions button {
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border-input);
    }
    .tour-save-btn {
      background: #a6e3a1;
      color: var(--bg-primary);
      border-color: #a6e3a1 !important;
    }
    .tour-cancel-btn {
      background: var(--bg-hover);
      color: var(--text-secondary);
    }

    /* Guide mode */
    #guide-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #guide-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    #guide-btn.active {
      background: var(--accent);
      color: var(--bg-primary);
      border-color: var(--accent);
    }
    #guide-banner {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 12px;
      font-size: 12px;
      border-bottom: 1px solid;
      flex-shrink: 0;
    }
    #follow-btn {
      background: var(--bg-hover);
      border: 1px solid var(--border-input);
      color: var(--text-secondary);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    #follow-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    #follow-btn.active {
      background: #a6e3a1;
      color: var(--bg-primary);
      border-color: #a6e3a1;
    }

    /* Status bar */
    #status {
      height: 22px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 0 12px;
      display: flex;
      align-items: center;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="connect-overlay">
    <div id="connect-box">
      <h1>Pairpad</h1>
      <p class="tagline">Collaborative code editing on your local files</p>

      <!-- Step 1: Session ID -->
      <div id="step-session">
        <div class="input-row">
          <input type="text" id="session-input" placeholder="Paste a session link or ID" autofocus>
          <button onclick="submitSession()">Next</button>
        </div>
      </div>

      <!-- Step 2: Display name -->
      <div id="step-password" style="display:none">
        <p class="tagline" style="margin-bottom:16px">This session requires a password</p>
        <div class="input-row">
          <input type="password" id="password-input" placeholder="Session password">
          <button onclick="submitPassword()">Next</button>
        </div>
      </div>

      <div id="step-name" style="display:none">
        <p class="tagline" style="margin-bottom:16px">What should others call you?</p>
        <div class="input-row">
          <input type="text" id="name-input" placeholder="Your name" maxlength="30">
          <button onclick="joinSession()">Join</button>
        </div>
      </div>

      <div id="connect-error"></div>
    </div>
  </div>

  <div id="ide">
    <div id="topbar">
      <div class="session-info">
        <strong>Pairpad</strong>
        <span class="session-id" id="session-id-display"></span>
      </div>
      <div class="participants" id="participant-list"></div>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="share-btn" onclick="copySessionURL()" style="background:var(--bg-hover);border:1px solid var(--border-input);color:var(--text-secondary);padding:3px 8px;border-radius:4px;font-size:11px;cursor:pointer;" title="Copy session URL for collaborators">Share</button>
        <button id="tour-toggle-btn" onclick="toggleTourBar()">Tours</button>
        <button id="guide-btn" onclick="toggleGuide()">Guide</button>
        <button id="theme-btn" onclick="toggleTheme()" style="background:var(--bg-hover);border:1px solid var(--border-input);color:var(--text-secondary);padding:3px 8px;border-radius:4px;font-size:13px;cursor:pointer;" title="Toggle light/dark theme"></button>
      </div>
    </div>
    <div id="reconnect-banner">Connection lost. Reconnecting...</div>
    <div id="workspace">
      <div id="sidebar">
        <div id="sidebar-header">Explorer</div>
        <div id="file-tree"></div>
      </div>
      <div style="flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;">
        <div id="guide-banner"><span id="guide-banner-text"></span><button id="follow-btn" onclick="toggleFollow()">Follow</button></div>
        <div id="tour-bar">
          <select id="tour-select" onchange="selectTour()"></select>
          <div class="tour-nav">
            <button id="tour-prev" onclick="tourPrev()">Prev</button>
            <span id="tour-step-counter"></span>
            <button id="tour-next" onclick="tourNext()">Next</button>
          </div>
          <div id="tour-actions" style="display:flex;gap:4px;margin-left:auto;">
            <button onclick="editCurrentTour()" style="background:#313244;border:1px solid #45475a;color:#a6adc8;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;">Edit</button>
            <button onclick="startTourCreation()" style="background:#313244;border:1px solid #45475a;color:#a6adc8;padding:2px 8px;border-radius:4px;font-size:11px;cursor:pointer;">New</button>
          </div>
          <button id="tour-close-btn" onclick="closeTour()">&times;</button>
        </div>
        <div id="tour-create-panel" style="display:none"></div>
        <div id="tour-step-panel" style="display:none">
          <div id="tour-step-title"></div>
          <div id="tour-step-desc"></div>
        </div>
        <div id="readonly-banner">Read-only — you can comment but not edit files. <a href="#" onclick="requestEditAccess(); return false;" style="color:var(--accent);">Request edit access</a></div>
        <div id="breadcrumb"></div>
        <div id="tabs"></div>
        <div id="editor-container"></div>
        <button id="comment-toggle-btn" onclick="toggleCommentSidebar()">Comments</button>
      </div>
      <div id="comment-sidebar" class="hidden">
        <div id="comment-header">
          <span>Comments</span>
          <span class="toggle-btn" onclick="toggleCommentSidebar()">&times;</span>
        </div>
        <div id="comment-feed"></div>
      </div>
    </div>
    <div id="toast-container"></div>
    <div id="status">
      <span id="status-text">Connected</span>
    </div>
  </div>

  <div id="file-picker-overlay">
    <div id="file-picker">
      <input id="file-picker-input" placeholder="Go to file..." autocomplete="off">
      <div id="file-picker-results"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
